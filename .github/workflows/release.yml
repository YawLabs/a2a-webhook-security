# AWSP -- A2A Webhook Security Profile
# Release: publish the TypeScript reference implementation (@yawlabs/awsp)
# to npm on every `v*` tag push.
#
# Other-language publishing (PyPI, Maven Central, NuGet, Go modules)
# intentionally omitted -- those need credential setup the maintainer
# hasn't done yet. Add jobs as credentials become available.
#
# Trust + reproducibility notes:
#   * `npm publish --provenance` attaches a signed SLSA provenance
#     statement so consumers can verify the package was built by this
#     workflow, in this repo, on this tag. Requires `id-token: write`.
#   * NPM_TOKEN is an org-level automation token (not a session token).
#     Session tokens fail in headless CI with misleading errors.
#   * The whole `v*` tag triggers a publish -- the maintainer's release
#     procedure is "bump version in package.json, commit, tag, push
#     --follow-tags". The tag IS the release signal; no manual dispatch.
#   * We re-run `npm ci` + `npm test` on the release runner before
#     publishing so a green local but red CI never ships.

name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  # Required for `npm publish --provenance` to mint an OIDC token that
  # npm uses to attach the SLSA provenance attestation.
  id-token: write

# Opt JavaScript actions onto Node.js 24 ahead of the June 2026 default
# switch / Sept 2026 Node.js 20 removal.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  publish-typescript:
    name: publish @yawlabs/awsp to npm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: reference/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Pin the publish runtime to the current LTS. Provenance
          # support landed in npm 9.5+, which ships with Node 20.
          node-version: '20'
          cache: npm
          cache-dependency-path: reference/typescript/package-lock.json
          # Wires registry auth via the NODE_AUTH_TOKEN env var below.
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm test
      # --access public is required for first-publish of a scoped package
      # under a free org. Subsequent publishes accept it as a no-op, so
      # leaving it on is safe and self-documenting.
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
